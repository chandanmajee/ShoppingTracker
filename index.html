<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- 🔥 MOBILE ZOOM FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Refund Tracker</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:10px;
}

h1 { text-align:center; }

/* 🔥 INPUT FIX */
input,select,button {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
  font-size:16px; /* zoom fix */
}

button {
  background:#22c55e;
  color:white;
  font-weight:bold;
}

.card {
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  margin-bottom:15px;
}

/* 🔥 SECTION STACK (niche ek ke baad ek) */
.section {
  background:#020617;
  padding:12px;
  border-radius:12px;
  margin-bottom:15px;
  max-height:300px;
  display:flex;
  flex-direction:column;
}

.list {
  overflow-y:auto;
  flex:1;
}

.item {
  background:#334155;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.topStats {
  background:black;
  padding:12px;
  border-radius:12px;
  margin-bottom:15px;
}

.small { font-size:12px; color:#94a3b8; }
</style>
</head>

<body>

<h1>💸 Refund Tracker</h1>

<div class="topStats">
  💰 Order Amount: ₹<span id="invest">0</span> |
  💸 Refund: ₹<span id="refund">0</span>
</div>

<div class="card">

<input id="search" placeholder="🔍 Search..." oninput="showData()">

<input id="product" placeholder="Product Name">
<input id="amount" type="number" placeholder="Order Amount ₹">
<input id="refundAmount" type="number" placeholder="Refund Amount ₹">

<select id="source">
<option>Amazon</option>
<option>Flipkart</option>
<option>Meesho</option>
</select>

<select id="dealer">
<option>Siddharth</option>
<option>Binod</option>
<option>Opa</option>
</select>

<input id="refundDate" type="date">

<button onclick="addData()">Add Order</button>

</div>

<!-- 🔥 STACKED SECTIONS -->
<div class="section">
<h3>📦 All Orders</h3>
<div class="list" id="orders"></div>
</div>

<div class="section">
<h3>⏳ Pending</h3>
<div class="list" id="pending"></div>
</div>

<div class="section">
<h3>✅ Completed</h3>
<div class="list" id="complete"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("refundData")) || [];

function save(){
  localStorage.setItem("refundData",JSON.stringify(data));
}

function addData(){
  let product = document.getElementById("product").value;
  let amount = parseFloat(document.getElementById("amount").value) || 0;
  let refundAmount = parseFloat(document.getElementById("refundAmount").value) || 0;
  let source = document.getElementById("source").value;
  let dealer = document.getElementById("dealer").value;
  let refundDate = document.getElementById("refundDate").value;

  if(!product || !amount || !refundDate){
    alert("Fill all fields");
    return;
  }

  data.unshift({
    product,
    amount,
    refundAmount,
    source,
    dealer,
    refundDate,
    orderDate:new Date().toLocaleDateString(),
    status:"pending"
  });

  save();
  showData();

  // 🔥 CLEAR INPUTS AFTER ADD
  document.getElementById("product").value="";
  document.getElementById("amount").value="";
  document.getElementById("refundAmount").value="";
  document.getElementById("refundDate").value="";
}

function createHTML(item,i,type){
  let btn = "";

  if(type==="pending"){
    btn = `<button onclick="done(${i})">Done</button>`;
  }

  return `
  <div class="item">
    <b>${item.product}</b><br>
    Order Amount💰₹${item.amount}→Refund Amount💸₹${item.refundAmount}<br>
    🛒 ${item.source}<br>
    👤 ${item.dealer}<br>
    <div class="small">Order: ${item.orderDate}</div>
    <div class="small">Refund: ${item.refundDate}</div>
    ${btn}
  </div>`;
}

function showData(){
  let orders="",pending="",complete="";
  let invest=0,refund=0;

  let search=document.getElementById("search").value.toLowerCase();

  data.forEach((item,i)=>{

    if(!item.product.toLowerCase().includes(search) &&
       !item.dealer.toLowerCase().includes(search)) return;

    invest += Number(item.amount)||0;

    if(item.status==="complete"){
      refund += Number(item.refundAmount)||0;
    }

    orders += createHTML(item,i,"all");

    if(item.status==="pending"){
      pending += createHTML(item,i,"pending");
    } else {
      complete += createHTML(item,i,"complete");
    }
  });

  ordersDiv.innerHTML=orders;
  pendingDiv.innerHTML=pending;
  completeDiv.innerHTML=complete;

  investSpan.innerText=invest;
  refundSpan.innerText=refund;
}

const ordersDiv=document.getElementById("orders");
const pendingDiv=document.getElementById("pending");
const completeDiv=document.getElementById("complete");
const investSpan=document.getElementById("invest");
const refundSpan=document.getElementById("refund");

function done(i){
  data[i].status="complete";
  save();
  showData();
}

showData();
</script>

</body>
</html>
